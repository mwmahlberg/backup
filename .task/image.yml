version: '3'

vars:
  CONTAINERFILE: Dockerfile
  FEDORA_MAJOR_VERSION:
    sh: printf '%s' "${FEDORA_MAJOR_VERSION:-43}"
  RPM_PACKAGES:
    sh: |
      major="${FEDORA_MAJOR_VERSION:-43}"
      if [ -n "${RPM_PACKAGES:-}" ]; then
        printf '%s' "${RPM_PACKAGES}"
      elif [ "${major}" -ge 44 ] 2>/dev/null; then
        printf '%s' "alloy code direnv git go-task gstreamer1-plugins-bad-freeworld gstreamer1-plugins-ugly intel-media-driver libavcodec-freeworld libva-utils powertop restic vim-enhanced"
      else
        printf '%s' "alloy code direnv git go-task gstreamer1-plugins-bad-freeworld gstreamer1-plugins-ugly intel-gpu-tools intel-media-driver libavcodec-freeworld libva-utils powertop restic vim-enhanced"
      fi
  REGISTRY:
    sh: printf '%s' "${DOCKER_REGISTRY:-docker.io}"
  IMAGE:
    sh: printf '%s' "${IMAGE_NAME:-docker.io/mwmahlberg/kinoite-workstation:${FEDORA_MAJOR_VERSION:-43}}"

tasks:
  logout:
    desc: Log out from the container registry
    internal: true
    summary: |
      Log out from the configured container registry. The command is tolerant of an already-
      logged-out state so it can safely be used as a cleanup step before a fresh login.
    cmds:
      - podman logout "{{.REGISTRY}}" || true

  login:
    desc: Log in to the container registry
    internal: true
    summary: |
      Log in to the configured container registry using DOCKER_PASSWORD and the optional
      DOCKER_USERNAME. With interactive prompting enabled, missing required variables are
      requested automatically instead of failing immediately.
    deps:
      - logout
    requires:
      vars:
        - DOCKER_PASSWORD
    cmds:
      - printf '%s' "${DOCKER_PASSWORD}" | podman login "{{.REGISTRY}}" -u "${DOCKER_USERNAME:-mwmahlberg}" --password-stdin

  check:
    desc: Report which RPM packages are already present in the base image
    summary: |
      Runs a temporary container from the configured base image and queries each
      package in RPM_PACKAGES via rpm -q. Prints two lists: packages already
      present in the base and those that need to be added by rpm-ostree install.

      Useful before bumping FEDORA_MAJOR_VERSION to understand what has changed.

      Override defaults via environment variables:
        FEDORA_MAJOR_VERSION=42 task image:check
        RPM_PACKAGES="git vim" task image:check
    cmds:
      - |
        BASE=quay.io/fedora-ostree-desktops/kinoite:{{.FEDORA_MAJOR_VERSION}}
        echo "Base image: ${BASE}"
        echo ""
        podman run --rm "${BASE}" \
          bash -c \
            'present=(); missing=()
            for pkg in "$@"; do
              if rpm -q "$pkg" &>/dev/null; then present+=("$pkg"); else missing+=("$pkg"); fi
            done
            echo "Already in base image (${#present[@]}):"
            [ ${#present[@]} -gt 0 ] && printf "  [present] %s\n" "${present[@]}" || echo "  (none)"
            echo ""
            echo "To be installed via rpm-ostree (${#missing[@]}):"
            [ ${#missing[@]} -gt 0 ] && printf "  [missing] %s\n" "${missing[@]}" || echo "  (none)"' \
          -- {{.RPM_PACKAGES}}

  build:
    desc: Build the Kinoite image locally
    summary: |
      Build the custom Kinoite image from Dockerfile using podman. The task tracks
      the Dockerfile as a source so task can skip the build when nothing relevant changed.
    sources:
      - "{{.CONTAINERFILE}}"
      - Taskfile.yml
      - .taskrc.yml
      - .task/*.yml
      - restic/**/*
      - restore/**/*
      - docs/**/*
      - README.md
      - README.de.md
    cmds:
      - |
        podman build \
          --pull=newer \
          --no-cache \
          --build-arg FEDORA_MAJOR_VERSION={{.FEDORA_MAJOR_VERSION}} \
          --build-arg "RPM_PACKAGES={{.RPM_PACKAGES}}" \
          -t "{{.IMAGE}}" \
          -f "{{.CONTAINERFILE}}" .

  push:
    desc: Push the Kinoite image to the registry
    summary: |
      Log in to the container registry if necessary, build the image when sources changed,
      and push the resulting image tag to the configured registry.
    deps:
      - login
      - build
    cmds:
      - podman push "{{.IMAGE}}"

  digest:
    desc: Print the remote image digest
    summary: |
      Query the registry for the currently published digest of the configured image tag.
      This is primarily used by the rebase workflow to pin target deployments to a digest.
    deps:
      - build
    cmds:
      - skopeo inspect --format '{{"{{.Digest}}"}}' "docker://{{.IMAGE}}"
