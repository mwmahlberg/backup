version: '3'

vars:
  CONTAINERFILE: Dockerfile
  REGISTRY:
    sh: printf '%s' "${DOCKER_REGISTRY:-docker.io}"
  IMAGE:
    sh: printf '%s' "${IMAGE_NAME:-docker.io/mwmahlberg/kinoite-workstation:43}"
  COSIGN_CERTIFICATE_IDENTITY_REGEXP:
    sh: printf '%s' "${COSIGN_CERTIFICATE_IDENTITY_REGEXP:-https://github\\.com/mwmahlberg/backup/\\.github/workflows/publish-release\\.yml@refs/tags/v.+}"
  COSIGN_CERTIFICATE_OIDC_ISSUER_REGEXP:
    sh: printf '%s' "${COSIGN_CERTIFICATE_OIDC_ISSUER_REGEXP:-https://token\\.actions\\.githubusercontent\\.com}"

tasks:
  logout:
    desc: Log out from the container registry
    internal: true
    summary: |
      Log out from the configured container registry. The command is tolerant of an already-
      logged-out state so it can safely be used as a cleanup step before a fresh login.
    cmds:
      - podman logout "{{.REGISTRY}}" || true

  login:
    desc: Log in to the container registry
    internal: true
    summary: |
      Log in to the configured container registry using DOCKER_PASSWORD and the optional
      DOCKER_USERNAME. With interactive prompting enabled, missing required variables are
      requested automatically instead of failing immediately.
    deps:
      - logout
    requires:
      vars:
        - DOCKER_PASSWORD
    cmds:
      - |
        set -euo pipefail
        XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
        REGISTRY_AUTH_FILE="${REGISTRY_AUTH_FILE:-${XDG_RUNTIME_DIR}/containers/auth.json}"
        export XDG_RUNTIME_DIR REGISTRY_AUTH_FILE
        mkdir -p "$(dirname "$REGISTRY_AUTH_FILE")"
        printf '%s' "${DOCKER_PASSWORD}" | podman login "{{.REGISTRY}}" -u "${DOCKER_USERNAME:-mwmahlberg}" --password-stdin --authfile "$REGISTRY_AUTH_FILE"

  create:
    desc: Build the Kinoite image locally
    internal: true
    summary: |
      Build the custom Kinoite image from Dockerfile using podman. This is the local build
      primitive used by the public image tasks.
    sources:
      - "{{.CONTAINERFILE}}"
      - Taskfile.yml
      - .taskrc.yml
      - .task/*.yml
      - restic/**/*
      - restore/**/*
      - docs/**/*
      - README.md
      - README.de.md
    cmds:
      - podman build -t "{{.IMAGE}}" -f "{{.CONTAINERFILE}}" .

  sign:
    desc: Sign the pushed Kinoite image with cosign keyless
    internal: true
    summary: |
      Resolve the remote digest for the configured image tag and sign that digest with cosign
      using the keyless flow. This expects the image to be available in the registry already.
    deps:
      - login
    cmds:
      - |
        set -euo pipefail
        XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
        REGISTRY_AUTH_FILE="${REGISTRY_AUTH_FILE:-${XDG_RUNTIME_DIR}/containers/auth.json}"
        export XDG_RUNTIME_DIR REGISTRY_AUTH_FILE
        DIGEST="$(skopeo inspect --format '{{"{{.Digest}}"}}' "docker://{{.IMAGE}}")"
        cosign sign --yes "{{.IMAGE}}@${DIGEST}"

  verify:
    desc: Verify the pushed Kinoite image signature
    summary: |
      Resolve the remote digest for the configured image tag and verify that at least one
      cosign keyless signature matches the expected CI identity and OIDC issuer regexes.
      Override COSIGN_CERTIFICATE_IDENTITY_REGEXP or COSIGN_CERTIFICATE_OIDC_ISSUER_REGEXP
      when you intentionally want to trust a different signer, such as a local manual signature.
    cmds:
      - |
        set -euo pipefail
        DIGEST="$(skopeo inspect --format '{{"{{.Digest}}"}}' "docker://{{.IMAGE}}")"
        cosign verify \
          --certificate-identity-regexp '{{.COSIGN_CERTIFICATE_IDENTITY_REGEXP}}' \
          --certificate-oidc-issuer-regexp '{{.COSIGN_CERTIFICATE_OIDC_ISSUER_REGEXP}}' \
          "{{.IMAGE}}@${DIGEST}"

  build:
    desc: Build the Kinoite image locally
    summary: |
      Build the custom Kinoite image from Dockerfile using podman without pushing or signing it.
      Use image:push for the default publish-and-sign workflow.
    deps:
      - create

  push:
    desc: Push and sign the Kinoite image
    summary: |
      Log in to the container registry if necessary, build the image when sources changed,
      push the resulting image tag to the configured registry, and sign the pushed digest
      with cosign keyless.
    deps:
      - build
      - login
    cmds:
      - podman push "{{.IMAGE}}"
      - task: sign

  digest:
    desc: Print the remote image digest
    summary: |
      Query the registry for the currently published digest of the configured image tag.
      This is primarily used by the rebase workflow to pin target deployments to a digest.
    cmds:
      - skopeo inspect --format '{{"{{.Digest}}"}}' "docker://{{.IMAGE}}"
