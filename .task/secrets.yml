version: '3'
silent: true

tasks:
  setup:
    desc: Create restic secret files
    summary: |
      Create ~/.config/restic/password and ~/.config/restic/env from the provided
      environment variables with permission mode 0600. Missing required variables are
      prompted automatically when interactive mode is enabled.
    requires:
      vars:
        - RESTIC_REPOSITORY
        - AWS_ACCESS_KEY_ID
        - AWS_SECRET_ACCESS_KEY
        - RESTIC_PASSWORD
    cmds:
      - mkdir -p ~/.config/restic
      - printf '%s\n' "${RESTIC_PASSWORD}" > ~/.config/restic/password
      - chmod 600 ~/.config/restic/password
      - |
        cat > ~/.config/restic/env <<EOF
        RESTIC_REPOSITORY=${RESTIC_REPOSITORY}
        AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
        AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
        EOF
      - chmod 600 ~/.config/restic/env

  check:
    desc: Validate local restic secret files
    summary: |
      Ensure that ~/.config/restic/password and ~/.config/restic/env exist and,
      after running the internal permission-fix tasks, verify that both files end up
      with permission mode 0600.
    deps:
      - permission-fix
    cmds:
      - |
        set -euo pipefail
        for f in "$HOME/.config/restic/password" "$HOME/.config/restic/env"; do
          if [[ ! -f "$f" ]]; then
            echo "Missing file: $f" >&2
            exit 1
          fi
          test "$(stat -c '%a' "$f")" = "600"
        done
        echo "secrets:check passed"

  permission-fix:password:
    desc: Fix permissions for the restic password file
    internal: true
    summary: |
      Set ~/.config/restic/password to permission mode 0600 when the file exists.
      The task is skipped automatically when the file is missing or already has the correct mode.
    if: '[ -f "$HOME/.config/restic/password" ] && [ "$(stat -c %a "$HOME/.config/restic/password")" != "600" ]'
    cmds:
      - chmod 600 "$HOME/.config/restic/password"
      - 'echo "Set permissions to 600: $HOME/.config/restic/password"'

  permission-fix:env:
    desc: Fix permissions for the restic environment file
    internal: true
    summary: |
      Set ~/.config/restic/env to permission mode 0600 when the file exists.
      The task is skipped automatically when the file is missing or already has the correct mode.
    if: '[ -f "$HOME/.config/restic/env" ] && [ "$(stat -c %a "$HOME/.config/restic/env")" != "600" ]'
    cmds:
      - chmod 600 "$HOME/.config/restic/env"
      - 'echo "Set permissions to 600: $HOME/.config/restic/env"'

  permission-fix:
    desc: Fix local restic secret file permissions
    internal: true
    summary: |
      Run the dedicated permission-fix tasks for ~/.config/restic/password and
      ~/.config/restic/env. Each dependency decides on its own via task-level if
      whether the corresponding file exists and should be updated.
    deps:
      - permission-fix:password
      - permission-fix:env
    cmds:
      - echo "secrets:permission-fix completed"
