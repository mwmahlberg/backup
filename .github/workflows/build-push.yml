name: Build and push image

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 10 * * *'

jobs:
  build-push:
    name: Build and push Kinoite image (Fedora ${{ matrix.fedora_major }})
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        fedora_major: [43, 44]
        include:
          - fedora_major: 43
            packages: "alloy code direnv git go-task gstreamer1-plugins-bad-freeworld gstreamer1-plugins-ugly intel-gpu-tools intel-media-driver libavcodec-freeworld libva-utils powertop restic vim-enhanced"
            is_latest: true
          - fedora_major: 44
            packages: "alloy code direnv git go-task gstreamer1-plugins-bad-freeworld gstreamer1-plugins-ugly intel-media-driver libavcodec-freeworld libva-utils powertop restic vim-enhanced"
            is_latest: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image tags
        id: image-tag
        run: |
          branch="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            branch="${GITHUB_BASE_REF}"
          fi

          if [ "${branch}" = "main" ]; then
            primary_tag="docker.io/mwmahlberg/kinoite-workstation:${{ matrix.fedora_major }}"
            channel_tag="docker.io/mwmahlberg/kinoite-workstation:stable"
          else
            primary_tag="docker.io/mwmahlberg/kinoite-workstation:${{ matrix.fedora_major }}-dev"
            channel_tag="docker.io/mwmahlberg/kinoite-workstation:dev"
          fi

          echo "tags<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${primary_tag}" >> "${GITHUB_OUTPUT}"
          if [ "${{ matrix.is_latest }}" = "true" ]; then
            echo "${channel_tag}" >> "${GITHUB_OUTPUT}"
          fi
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Resolve push policy
        id: push-policy
        run: |
          branch="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            branch="${GITHUB_BASE_REF}"
          fi

          should_push="false"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && { [ "${branch}" = "main" ] || [ "${branch}" = "develop" ]; }; then
            should_push="true"
          fi

          echo "should-push=${should_push}" >> "${GITHUB_OUTPUT}"
          echo "Push policy: branch=${branch}, fedora_major=${{ matrix.fedora_major }}, should_push=${should_push}"

      - name: Log in to Docker Hub
        if: steps.push-policy.outputs.should-push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          pull: true
          push: ${{ steps.push-policy.outputs.should-push == 'true' }}
          tags: ${{ steps.image-tag.outputs.tags }}
          build-args: |
            FEDORA_MAJOR_VERSION=${{ matrix.fedora_major }}
            RPM_PACKAGES=${{ matrix.packages }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scheduled-rebuild:
    name: Daily rebuild Fedora ${{ matrix.fedora_major }} (${{ matrix.branch }})
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora_major: [43, 44]
        branch:
          - main
          - develop
        include:
          - fedora_major: 43
            packages: "alloy code direnv git go-task gstreamer1-plugins-bad-freeworld gstreamer1-plugins-ugly intel-gpu-tools intel-media-driver libavcodec-freeworld libva-utils powertop restic vim-enhanced"
            is_latest: true
          - fedora_major: 44
            packages: "alloy code direnv git go-task gstreamer1-plugins-bad-freeworld gstreamer1-plugins-ugly intel-media-driver libavcodec-freeworld libva-utils powertop restic vim-enhanced"
            is_latest: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image tags
        id: image-tag
        run: |
          branch="${{ matrix.branch }}"

          if [ "${branch}" = "main" ]; then
            primary_tag="docker.io/mwmahlberg/kinoite-workstation:${{ matrix.fedora_major }}"
            channel_tag="docker.io/mwmahlberg/kinoite-workstation:stable"
          else
            primary_tag="docker.io/mwmahlberg/kinoite-workstation:${{ matrix.fedora_major }}-dev"
            channel_tag="docker.io/mwmahlberg/kinoite-workstation:dev"
          fi

          echo "tags<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${primary_tag}" >> "${GITHUB_OUTPUT}"
          if [ "${{ matrix.is_latest }}" = "true" ]; then
            echo "${channel_tag}" >> "${GITHUB_OUTPUT}"
          fi
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          pull: true
          push: true
          tags: ${{ steps.image-tag.outputs.tags }}
          build-args: |
            FEDORA_MAJOR_VERSION=${{ matrix.fedora_major }}
            RPM_PACKAGES=${{ matrix.packages }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
