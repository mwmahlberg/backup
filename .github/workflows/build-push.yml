name: Build and push image

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-push:
    name: Build and push Kinoite image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: image-tag
        run: |
          branch="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            branch="${GITHUB_BASE_REF}"
          fi

          if [ "${branch}" = "main" ]; then
            echo "tag=docker.io/mwmahlberg/kinoite-workstation:43" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=docker.io/mwmahlberg/kinoite-workstation:43-dev" >> "${GITHUB_OUTPUT}"
          fi

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.image-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
