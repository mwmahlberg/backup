name: Build and push image

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  schedule:
    - cron: '0 10 * * *'

concurrency:
  group: build-push-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build image and push only from main/develop
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image tags
        id: image-tag
        run: |
          branch="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            branch="${GITHUB_BASE_REF}"
          fi

          fedora_tag="$(grep -E '^FROM[[:space:]]+quay\.io/fedora-ostree-desktops/kinoite:' Dockerfile | head -n1 | sed -E 's#^FROM[[:space:]]+quay\.io/fedora-ostree-desktops/kinoite:([^[:space:]]+).*$#\1#')"
          fedora_major="$(printf '%s' "${fedora_tag}" | sed -E 's/^([0-9]+).*/\1/')"

          if [ "${branch}" = "main" ]; then
            primary_tag="docker.io/mwmahlberg/kinoite-workstation:${fedora_major}"
            channel_tag="docker.io/mwmahlberg/kinoite-workstation:stable"
          else
            primary_tag="docker.io/mwmahlberg/kinoite-workstation:${fedora_major}-dev"
            channel_tag="docker.io/mwmahlberg/kinoite-workstation:dev"
          fi

          echo "primary-tag=${primary_tag}" >> "${GITHUB_OUTPUT}"
          echo "tags<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${primary_tag}" >> "${GITHUB_OUTPUT}"
          echo "${channel_tag}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Resolve push policy
        id: push-policy
        run: |
          fedora_tag="$(grep -E '^FROM[[:space:]]+quay\.io/fedora-ostree-desktops/kinoite:' Dockerfile | head -n1 | sed -E 's#^FROM[[:space:]]+quay\.io/fedora-ostree-desktops/kinoite:([^[:space:]]+).*$#\1#')"
          fedora_major="$(printf '%s' "${fedora_tag}" | sed -E 's/^([0-9]+).*/\1/')"

          should_push="false"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && { [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "develop" ]; }; then
            should_push="true"
          fi

          echo "fedora_tag=${fedora_tag}" >> "${GITHUB_OUTPUT}"
          echo "fedora_major=${fedora_major}" >> "${GITHUB_OUTPUT}"
          echo "should-push=${should_push}" >> "${GITHUB_OUTPUT}"
          echo "Push policy: ref=${GITHUB_REF_NAME}, event=${GITHUB_EVENT_NAME}, fedora_tag=${fedora_tag}, should_push=${should_push}"

      - name: Log in to Docker Hub
        if: steps.push-policy.outputs.should-push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and optionally push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ steps.push-policy.outputs.should-push == 'true' }}
          tags: ${{ steps.image-tag.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: steps.push-policy.outputs.should-push == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed image
        if: steps.push-policy.outputs.should-push == 'true'
        env:
          PRIMARY_TAG: ${{ steps.image-tag.outputs.primary-tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${PRIMARY_TAG}@${IMAGE_DIGEST}"

  scheduled-rebuild-43:
    name: Daily rebuild Fedora 43 (${{ matrix.branch }})
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch:
          - main
          - develop
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image tags
        id: image-tag
        run: |
          branch="${{ matrix.branch }}"
          fedora_tag="$(grep -E '^FROM[[:space:]]+quay\.io/fedora-ostree-desktops/kinoite:' Dockerfile | head -n1 | sed -E 's#^FROM[[:space:]]+quay\.io/fedora-ostree-desktops/kinoite:([^[:space:]]+).*$#\1#')"
          fedora_major="$(printf '%s' "${fedora_tag}" | sed -E 's/^([0-9]+).*/\1/')"

          if [ "${branch}" = "main" ]; then
            primary_tag="docker.io/mwmahlberg/kinoite-workstation:${fedora_major}"
            channel_tag="docker.io/mwmahlberg/kinoite-workstation:stable"
          else
            primary_tag="docker.io/mwmahlberg/kinoite-workstation:${fedora_major}-dev"
            channel_tag="docker.io/mwmahlberg/kinoite-workstation:dev"
          fi

          echo "fedora_major=${fedora_major}" >> "${GITHUB_OUTPUT}"
          echo "tags<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${primary_tag}" >> "${GITHUB_OUTPUT}"
          echo "${channel_tag}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Resolve push policy
        id: push-policy
        run: |
          should_push="false"
          if [ "${{ steps.image-tag.outputs.fedora_major }}" = "43" ]; then
            should_push="true"
          fi

          echo "should-push=${should_push}" >> "${GITHUB_OUTPUT}"
          echo "Scheduled policy: branch=${{ matrix.branch }}, fedora_major=${{ steps.image-tag.outputs.fedora_major }}, should_push=${should_push}"

      - name: Log in to Docker Hub
        if: steps.push-policy.outputs.should-push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ steps.push-policy.outputs.should-push == 'true' }}
          tags: ${{ steps.image-tag.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: steps.push-policy.outputs.should-push == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed image
        if: steps.push-policy.outputs.should-push == 'true'
        env:
          PRIMARY_TAG: ${{ steps.image-tag.outputs.tags }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          primary_tag="$(printf '%s\n' "${PRIMARY_TAG}" | head -n1)"
          cosign sign --yes "${primary_tag}@${IMAGE_DIGEST}"
