name: Finish automated release

on:
  workflow_run:
    workflows:
      - Validate image
    types:
      - completed

concurrency:
  group: release-finish-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  finish-release:
    name: Run git flow release finish
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'release/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Verify automated image update release
        id: verify
        env:
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RELEASE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          echo "auto_finish=true" >> "${GITHUB_OUTPUT}"
          echo "release_version=${RELEASE_BRANCH#release/}" >> "${GITHUB_OUTPUT}"

          release_commit="$(git log "${RELEASE_BRANCH}" --grep='^feat: Update to upstream [0-9a-f]\{12\}$' -n 1 --format=%H)"
          if [ -z "${release_commit}" ]; then
            exit 0
          fi

          subject="$(git show -s --format=%s "${release_commit}")"
          if ! printf '%s' "${subject}" | grep -Eq '^feat: Update to upstream [0-9a-f]{12}$'; then
            exit 0
          fi

          pr_number="$(git show -s --format=%b "${release_commit}" | sed -n 's/^Dependabot PR: #\([0-9][0-9]*\)$/\1/p' | head -n1)"
          if [ -n "${pr_number}" ]; then
            echo "dependabot_pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install git-flow
        if: steps.verify.outputs.auto_finish == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install --yes git-flow

      - name: Configure git-flow
        if: steps.verify.outputs.auto_finish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config gitflow.branch.master main
          git config gitflow.branch.develop develop
          git config gitflow.prefix.feature feature/
          git config gitflow.prefix.bugfix bugfix/
          git config gitflow.prefix.release release/
          git config gitflow.prefix.hotfix hotfix/
          git config gitflow.prefix.support support/
          git config gitflow.prefix.versiontag v

      - name: Fetch integration branches
        if: steps.verify.outputs.auto_finish == 'true'
        run: |
          set -euo pipefail

          git fetch --prune origin main develop --tags

          if git show-ref --verify --quiet refs/heads/main; then
            git checkout main
          else
            git checkout -b main origin/main
          fi
          git reset --hard origin/main

          if git show-ref --verify --quiet refs/heads/develop; then
            git checkout develop
          else
            git checkout -b develop origin/develop
          fi
          git reset --hard origin/develop

          git checkout "${{ github.event.workflow_run.head_branch }}"

      - name: Finish release branch
        if: steps.verify.outputs.auto_finish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.verify.outputs.release_version }}
        run: |
          set -euo pipefail
          export GIT_MERGE_AUTOEDIT=no

          git checkout "${{ github.event.workflow_run.head_branch }}"
          git flow release finish -m "v${RELEASE_VERSION}" "${RELEASE_VERSION}"

      - name: Push main, develop and tag
        if: steps.verify.outputs.auto_finish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.verify.outputs.release_version }}
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          git push origin main develop
          git push origin "v${RELEASE_VERSION}"
          git push origin --delete "${RELEASE_BRANCH}"

      - name: Comment on superseded Dependabot PR
        if: steps.verify.outputs.auto_finish == 'true' && steps.verify.outputs.dependabot_pr_number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number('${{ steps.verify.outputs.dependabot_pr_number }}');
            const releaseVersion = '${{ steps.verify.outputs.release_version }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `This update has been incorporated through the automated image release flow and released as \`v${releaseVersion}\`. Closing this PR as superseded.`,
            });

      - name: Close superseded Dependabot PR
        if: steps.verify.outputs.auto_finish == 'true' && steps.verify.outputs.dependabot_pr_number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number('${{ steps.verify.outputs.dependabot_pr_number }}');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed',
            });
