name: Release

on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release branch changelogs
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && (github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]'))

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive release tag from branch name
        id: release-tag
        run: |
          case "${GITHUB_REF_NAME}" in
            release/*)
              version="${GITHUB_REF_NAME#release/}"
              branch_kind="release"
              ;;
            hotfix/*)
              version="${GITHUB_REF_NAME#hotfix/}"
              branch_kind="hotfix"
              ;;
            *)
              echo "Branch ${GITHUB_REF_NAME} is not a supported git-flow release or hotfix branch" >&2
              exit 1
              ;;
          esac

          if ! printf '%s' "$version" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Branch name must look like ${branch_kind}/vx.y.z" >&2
            exit 1
          fi

          normalized_version="${version#v}"
          echo "branch_kind=${branch_kind}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${normalized_version}" >> "$GITHUB_OUTPUT"

      - name: Create temporary local release tag
        run: |
          if git rev-parse "${{ steps.release-tag.outputs.release_tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.release-tag.outputs.release_tag }} already exists locally; using existing tag"
          else
            git tag "${{ steps.release-tag.outputs.release_tag }}"
          fi

      - name: Derive previous release tag
        id: previous-tag
        run: |
          previous_tag="$(git tag --sort=creatordate --merged HEAD 'v*' \
            | grep -Fxv "${{ steps.release-tag.outputs.release_tag }}" \
            | tail -n1)"

          if [ -z "$previous_tag" ]; then
            echo "No previous release tag found for changelog generation" >&2
            exit 1
          fi

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md from conventional commits
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fromTag: ${{ github.sha }}
          toTag: ${{ steps.previous-tag.outputs.previous_tag }}
          changelogFilePath: CHANGELOG.md
          includeInvalidCommits: false
          restrictToTypes: feat,fix,perf,refactor,build,docs,style,test,chore,ci,revert
          writeToFile: true

      - name: Write releaselog.md
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.release_tag }}
          RELEASE_CHANGES: ${{ steps.changelog.outputs.changes }}
        run: |
          release_date="$(date +%F)"
          {
            echo '# Release Log'
            echo
            echo "## ${RELEASE_TAG} (${release_date})"
            echo
            printf '%s\n' "$RELEASE_CHANGES"
          } > releaselog.md

      - name: Remove temporary local release tag
        if: always()
        run: |
          if git rev-parse "${{ steps.release-tag.outputs.release_tag }}" >/dev/null 2>&1 \
            && [ "$(git rev-list -n 1 "${{ steps.release-tag.outputs.release_tag }}")" = "$(git rev-parse HEAD)" ]; then
            git tag -d "${{ steps.release-tag.outputs.release_tag }}"
          fi

      - name: Commit generated changelogs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ${{ github.ref_name }}
          commit_message: 'docs(${{ steps.release-tag.outputs.branch_kind }}): update changelogs for ${{ steps.release-tag.outputs.release_tag }} [skip ci]'
          file_pattern: CHANGELOG.md releaselog.md

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && github.ref_name != 'v0.0.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog for tag
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          includeInvalidCommits: false
          restrictToTypes: feat,fix,perf,refactor,build,docs,style,test,chore,ci,revert
          writeToFile: false

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: true
          body: |
            ${{ steps.changelog.outputs.changes }}

            [README for ${{ github.ref_name }}](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md)
          draft: false
          makeLatest: true
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
