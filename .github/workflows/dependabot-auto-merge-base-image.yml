name: Dependabot auto-merge base image updates

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-eligibility:
    name: Check Dependabot base image PR
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'develop' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      eligible: ${{ steps.eligibility.outputs.eligible }}
    steps:
      - name: Validate changed files and base image update
        id: eligibility
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const dockerfile = files.find((f) => f.filename === 'Dockerfile');
            if (!dockerfile) {
              core.info('Dockerfile not changed; skipping auto-merge.');
              core.setOutput('eligible', 'false');
              return;
            }

            const patch = dockerfile.patch || '';
            const baseImageChanged = /(^|\n)[+-]FROM\s+quay\.io\/fedora-ostree-desktops\/kinoite:/m.test(patch);
            if (!baseImageChanged) {
              core.info('Dockerfile changed, but no base image FROM update detected; skipping auto-merge.');
              core.setOutput('eligible', 'false');
              return;
            }

            core.info('Eligible Dependabot base image update PR detected.');
            core.setOutput('eligible', 'true');

  approve-and-enable-automerge:
    name: Approve and enable auto-merge
    needs: check-eligibility
    if: needs.check-eligibility.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-approve Dependabot PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
