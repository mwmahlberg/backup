version: '3'

includes:
  backup:
    taskfile: ./.task/backup.yml
  github:
    taskfile: ./.task/github.yml
  image:
    taskfile: ./.task/image.yml
  ostree:
    taskfile: ./.task/ostree.yml
  restore:
    taskfile: ./.task/restore.yml
  release:
    taskfile: ./.task/release.yml
  secrets:
    taskfile: ./.task/secrets.yml
  setup:
    taskfile: ./.task/setup.yml
  system:
    taskfile: ./.task/system.yml

tasks:
  default:
    desc: List available tasks
    summary: |
      Print all tasks from the root Taskfile and the included namespace taskfiles.
      Use this command when you want a quick overview of the supported workflows.
    cmds:
      - task --list

  help:
    desc: Show guided workflows
    summary: |
      Print the recommended end-to-end flows for first boot, full restore,
      post-restore scheduling, and diagnostics. This is the best starting point
      for users who want the shortest supported path.
    cmds:
      - |
        cat <<'EOF'
        Backup/Restore Workflows

        1) Fresh system, one-command setup
           backup-task setup:first-boot

        2) Full restore
           backup-task restore:full

        3) Re-enable timers after reboot
           backup-task system:schedule

        4) Run diagnostics
           backup-task doctor

        Inside the repository you can use 'task' directly.
        EOF

  doctor:
    desc: Validate backup and restore prerequisites
    summary: |
      Check that required binaries exist, that the bundled backup source is available,
      and that local restic configuration files are present. This task is safe to run
      before setup, backup, restore, or support/debugging work.
    cmds:
      - |
        set -euo pipefail
        PROFILE="${BACKUP_HOME_DIR:-$HOME/.local/share/backup}/restic/profiles.toml"
        SRC="${BACKUP_SOURCE_DIR:-/usr/share/backup}"

        if [[ ! -d "$SRC" ]] && [[ -d "./restic" ]] && [[ -d "./restore" ]] && [[ -d "./.task" ]]; then
          SRC="."
        fi

        for bin in restic resticprofile task; do
          command -v "$bin" >/dev/null 2>&1 || {
            echo "Missing required binary: $bin" >&2
            exit 1
          }
        done

        [[ -d "$SRC" ]] || {
          echo "Missing backup source directory: $SRC" >&2
          exit 1
        }

        if [[ ! -f "$PROFILE" ]]; then
          echo "Notice: $PROFILE is missing (run: task backup:seed or task restore:init)"
        fi

        if [[ ! -f "$HOME/.config/restic/password" ]]; then
          echo "Notice: ~/.config/restic/password is missing"
        fi

        if [[ ! -f "$HOME/.config/restic/env" ]]; then
          echo "Notice: ~/.config/restic/env is missing"
        fi

        echo "doctor: base checks passed"
